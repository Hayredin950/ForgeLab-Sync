name: Random Number Commit (Max Speed)

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  commit-random:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "HayreBuilds"
          git config user.email "hayrebuilds@gmail.com"
          

      - name: Commit loop (max speed)
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            NUMBER=$(shuf -i 1000000000-9999999999 -n 1)
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            cat > README.md << EOF
          # Random Number Bot 🤖

          **Latest Random Number:** \`$NUMBER\`

          **Last Updated:** $TIMESTAMP

          *Auto-committed at max speed via GitHub Actions*
          EOF
            git add README.md
            git commit -m "🎲 $NUMBER"
            git push
          done
